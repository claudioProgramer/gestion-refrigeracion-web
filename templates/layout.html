<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Refrigeración</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Sistema de Gestión Técnica</span>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="mb-3">
            <a href="/" class="btn btn-secondary">Inicio</a>
            <a href="/clientes" class="btn btn-primary">Clientes</a>
            <a href="/servicios" class="btn btn-warning">Servicios</a>
            <a href="/productos" class="btn btn-success">Productos</a>
            <a href="/logout" class="btn btn-danger">Cerrar sesión</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'info' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>

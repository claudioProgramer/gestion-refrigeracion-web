{% extends "layout.html" %}

{% block content %}
    <h1>Editar Cliente</h1>

    <form method="POST">
        <input type="text" name="nombre" value="{{ cliente[1] }}" required><br><br>
        <input type="text" name="telefono" value="{{ cliente[2] }}"><br><br>
        <input type="text" name="direccion" value="{{ cliente[3] }}"><br><br>
        <input type="email" name="email" value="{{ cliente[4] }}"><br><br>

        <button type="submit">Actualizar</button>
    </form>

{% endblock %}
